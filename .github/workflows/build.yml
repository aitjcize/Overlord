name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:alpine
    steps:
      - uses: actions/checkout@v3
      - name: install
        run: |
          apk update
          apk add git python3 make gcc linux-headers libc-dev py-pip curl
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r py/requirements.txt
          pip install yapf pylint
      - name: Fix permission
        run: git config --global --add safe.directory $PWD
      - name: go-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
          make go-lint
      - name: py-lint
        run: |
          source .venv/bin/activate
          make py-format-check
          make py-lint
      - name: test
        run: go test -v ./...
      - name: unittest
        run: |
          source .venv/bin/activate
          ./py/ovl_unittest.py
      - name: e2e_test
        run: |
          source .venv/bin/activate
          mkdir -p webroot/apps/test
          ./test/overlord_e2e_unittest.py

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build the Docker image
        run: docker build -t aitjcize/overlord:latest .
      - name: Push Docker image
        run: docker push aitjcize/overlord:latest
